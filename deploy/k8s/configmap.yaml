apiVersion: v1
kind: ConfigMap
metadata:
  name: order-processing-config
  namespace: order-processing
  labels:
    app.kubernetes.io/name: order-processing
    app.kubernetes.io/component: app
data:
  APP_NAME: "order-processing"
  APP_ENV: "production"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "info"
  LOG_PRETTY: "false"

  HTTP_HOST: "0.0.0.0"
  HTTP_PORT: "8080"
  HTTP_READ_TIMEOUT: "15s"
  HTTP_WRITE_TIMEOUT: "15s"
  HTTP_IDLE_TIMEOUT: "60s"
  HTTP_SHUTDOWN_TIMEOUT: "20s"

  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "orders"
  DB_SSLMODE: "disable"
  DB_MAX_OPEN_CONNS: "50"
  DB_MAX_IDLE_CONNS: "25"
  DB_CONN_MAX_LIFETIME: "1h"
  DB_CONN_MAX_IDLE_TIME: "30m"
  DB_CONNECT_RETRIES: "10"
  DB_CONNECT_BACKOFF: "2s"

  JWT_ISSUER: "order-processing"
  JWT_ACCESS_TTL: "24h"

  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "20"
  RATE_LIMIT_BURST: "40"
  RATE_LIMIT_TTL: "10m"

  ORDER_WORKERS: "8"
  ORDER_QUEUE_SIZE: "1024"
  NOTIFICATION_WORKERS: "4"
  NOTIFICATION_QUEUE_SIZE: "2048"
  EVENT_WORKERS: "4"
  EVENT_QUEUE_SIZE: "2048"

  PAYMENT_PROVIDER: "mock"
  PAYMENT_FAILURE_RATE: "0.1"
  PAYMENT_MIN_LATENCY: "20ms"
  PAYMENT_MAX_LATENCY: "120ms"
  PAYMENT_MAX_ATTEMPTS: "3"
  PAYMENT_RETRY_BACKOFF: "50ms"

  RABBITMQ_ENABLED: "false"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "guest"
  RABBITMQ_VHOST: "/"
  RABBITMQ_EXCHANGE: "orders.events"
